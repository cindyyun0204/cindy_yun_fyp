name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test dependencies
        # The full requirements.txt pulls in torch/whisperx/mediapipe which
        # are heavy and CUDA-oriented. CI only needs the bits that the unit
        # tests touch (state store + Pydantic schemas). conftest.py stubs
        # torch/whisperx so the import of server.py succeeds. numpy is used
        # directly in server.py and is small/fast, so install it normally.
        run: |
          python -m pip install --upgrade pip
          pip install fastapi httpx python-multipart pytest pytest-asyncio numpy "pydantic>=2.6,<3.0"

      - name: Run tests
        working-directory: emotion-server
        run: pytest tests/ -v

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check emotion-server/ --select=E,F,W --ignore=E501,F401
